services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: neuron_user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: neuron_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      - DATABASE_URL=postgresql://neuron_user:password@db:5432/neuron_db
      - REDIS_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    command: celery -A app.worker.celery_app worker --loglevel=info --pool=solo
    environment:
      - DATABASE_URL=postgresql://neuron_user:password@db:5432/neuron_db
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

volumes:
  pgdata:
